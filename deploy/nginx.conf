# ============================================================
# /etc/nginx/sites-available/paju-k
#
# 설치 방법:
#   sudo cp /home/ubuntu/paju-k/deploy/nginx.conf /etc/nginx/sites-available/paju-k
#   sudo ln -s /etc/nginx/sites-available/paju-k /etc/nginx/sites-enabled/paju-k
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# ※ HTTPS 적용 후 Certbot이 이 파일을 자동으로 수정합니다.
# ============================================================

# HTTP → HTTPS 리디렉트 (Certbot 적용 전에는 주석 처리)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN www.YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # ↓ 도메인을 실제 도메인으로 교체하세요
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # 최대 업로드 크기
    client_max_body_size 10M;

    # Gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Next.js 정적 파일 캐시
    location /_next/static/ {
        alias /home/ubuntu/paju-k/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # public 폴더 정적 파일
    location /public/ {
        alias /home/ubuntu/paju-k/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Next.js 앱으로 프록시
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
